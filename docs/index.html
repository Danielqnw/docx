<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>docx · Ruby Gem 文档 / Docs</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,900&family=Newsreader:ital,opsz,wght@0,6..72,400;0,6..72,500;1,6..72,400&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet" />
<style>
  :root {
    --paper:#f4efe4;
    --paper-2:#ece4d4;
    --paper-3:#e3d9c5;
    --ink:#231d17;
    --ink-soft:#5b5043;
    --ink-faint:#8a7d6b;
    --line:#d3c6ad;
    --accent:#bb3b1f;
    --accent-2:#1f5d6b;
    --accent-weak:rgba(187,59,31,0.12);
    --accent-2-weak:rgba(31,93,107,0.12);
    --code-bg:#221c16;
    --code-fg:#ece3d2;
    --shadow:0 1px 0 rgba(35,29,23,.04), 0 18px 40px -28px rgba(35,29,23,.55);
    --display:"Fraunces", Georgia, serif;
    --body:"Newsreader", Georgia, serif;
    --mono:"JetBrains Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --sidebar-w:310px;
    --maxw:760px;
  }
  html[data-theme="dark"] {
    --paper:#17130f;
    --paper-2:#1f1a14;
    --paper-3:#272019;
    --ink:#efe7d8;
    --ink-soft:#b8ac98;
    --ink-faint:#8a7d6b;
    --line:#352c22;
    --accent:#e2613f;
    --accent-2:#5bb0c0;
    --accent-weak:rgba(226,97,63,0.16);
    --accent-2-weak:rgba(91,176,192,0.16);
    --code-bg:#0e0b08;
    --code-fg:#e9e0cf;
    --shadow:0 1px 0 rgba(0,0,0,.2), 0 24px 50px -30px rgba(0,0,0,.8);
  }

  * { box-sizing:border-box; }
  html { scroll-behavior:smooth; scroll-padding-top:32px; }
  body {
    margin:0;
    background-color:var(--paper);
    background-image:
      radial-gradient(circle at 12% -8%, var(--accent-weak), transparent 38%),
      radial-gradient(circle at 100% 0%, var(--accent-2-weak), transparent 30%);
    color:var(--ink);
    font-family:var(--body);
    font-size:18px;
    line-height:1.72;
    -webkit-font-smoothing:antialiased;
    text-rendering:optimizeLegibility;
  }

  /* reading progress */
  #progress {
    position:fixed; top:0; left:0; height:3px; width:0%;
    background:linear-gradient(90deg,var(--accent),var(--accent-2));
    z-index:60; transition:width .12s ease-out;
  }

  /* layout */
  .shell { display:grid; grid-template-columns:var(--sidebar-w) minmax(0,1fr); gap:0; max-width:1280px; margin:0 auto; }

  /* sidebar */
  aside {
    position:sticky; top:0; align-self:start; height:100vh;
    border-right:1px solid var(--line);
    padding:30px 26px 40px; overflow-y:auto;
    background:linear-gradient(180deg, color-mix(in srgb, var(--paper) 92%, transparent), transparent);
    backdrop-filter:blur(4px);
  }
  .brand { display:flex; align-items:baseline; gap:10px; margin-bottom:4px; }
  .brand .logo {
    font-family:var(--display); font-weight:900; font-size:34px; letter-spacing:-.02em; line-height:1;
    color:var(--ink);
  }
  .brand .logo .dot { color:var(--accent); }
  .brand .ver { font-family:var(--mono); font-size:11px; color:var(--ink-faint); border:1px solid var(--line); border-radius:4px; padding:2px 8px; }
  .tagline { font-size:13.5px; color:var(--ink-soft); margin:0 0 18px; font-style:italic; }

  .controls { display:flex; gap:8px; margin-bottom:22px; align-items:center; }
  .seg { display:inline-flex; border:1px solid var(--line); border-radius:5px; overflow:hidden; background:var(--paper-2); }
  .seg button {
    font-family:var(--mono); font-size:11.5px; letter-spacing:.04em;
    border:0; background:transparent; color:var(--ink-soft); padding:6px 13px; cursor:pointer; transition:.18s;
  }
  .seg button.on { background:var(--accent); color:#fff; }
  .icon-btn {
    margin-left:auto; border:1px solid var(--line); background:var(--paper-2); color:var(--ink-soft);
    width:34px; height:34px; border-radius:7px; cursor:pointer; display:grid; place-items:center; transition:.18s; font-size:15px;
  }
  .icon-btn:hover { color:var(--accent); border-color:var(--accent); }

  nav .toc-label { font-family:var(--mono); font-size:10.5px; letter-spacing:.22em; text-transform:uppercase; color:var(--ink-faint); margin:0 0 12px; }
  nav ul { list-style:none; margin:0; padding:0; }
  nav a {
    display:block; text-decoration:none; color:var(--ink-soft);
    padding:3px 0 3px 14px; border-left:2px solid transparent; transition:.16s;
    font-size:15px; line-height:1.45;
  }
  nav a:hover { color:var(--ink); }
  nav a.lvl1 { font-weight:500; }
  nav a.lvl2 { padding-left:28px; font-size:14px; }
  nav a.lvl3 { padding-left:42px; font-size:13px; color:var(--ink-faint); }
  nav a.active { color:var(--accent); border-left-color:var(--accent); background:var(--accent-weak); border-radius:0 3px 3px 0; }
  nav a.active.lvl1 { font-weight:600; }

  /* main */
  main { padding:0 0 140px; min-width:0; }
  .wrap { max-width:var(--maxw); margin:0 auto; padding:0 28px; }

  /* hero */
  header.hero { padding:88px 0 46px; border-bottom:1px solid var(--line); margin-bottom:54px; }
  .kicker { font-family:var(--mono); font-size:12px; letter-spacing:.28em; text-transform:uppercase; color:var(--accent); margin:0 0 20px; }
  h1.title { font-family:var(--display); font-weight:900; font-size:clamp(52px,9vw,104px); line-height:.92; letter-spacing:-.04em; margin:0; }
  h1.title em { font-style:italic; font-weight:400; color:var(--accent); }
  .lede { font-size:clamp(20px,2.4vw,26px); line-height:1.45; color:var(--ink-soft); max-width:34ch; margin:26px 0 0; }
  .hero-meta { display:flex; flex-wrap:wrap; gap:10px; margin-top:30px; }
  .chip { font-family:var(--mono); font-size:11.5px; color:var(--ink-soft); border:1px solid var(--line); border-radius:4px; padding:6px 11px; background:var(--paper-2); }
  .chip b { color:var(--accent); font-weight:700; }

  /* sections */
  section { scroll-margin-top:24px; padding-top:18px; margin-bottom:18px; }
  .sec-num { font-family:var(--mono); font-size:12px; color:var(--accent); letter-spacing:.1em; display:block; margin-bottom:6px; }
  h2 { font-family:var(--display); font-weight:600; font-size:clamp(30px,4vw,40px); letter-spacing:-.02em; line-height:1.08; margin:46px 0 18px; padding-top:14px; }
  h2:first-of-type { margin-top:8px; }
  h3 { font-family:var(--display); font-weight:600; font-size:25px; letter-spacing:-.01em; margin:38px 0 12px; }
  h4 { font-family:var(--display); font-weight:600; font-size:20px; margin:30px 0 10px; color:var(--ink); }
  section.reading > h2, section.reading > h3, section.reading > h4 { }
  section.reading > h2::before, section.reading > h3::before {
    content:""; display:inline-block; width:0; height:.78em; margin-right:0; vertical-align:-2px;
    border-left:3px solid var(--accent); transition:width .25s, margin-right .25s;
  }
  section.reading > h2:hover::before { width:3px; margin-right:12px; }
  p { margin:0 0 18px; }
  a.link { color:var(--accent); text-decoration:none; border-bottom:1px solid var(--accent-weak); }
  a.link:hover { border-bottom-color:var(--accent); }
  strong { font-weight:600; }
  em.term { font-style:italic; color:var(--accent-2); }
  code.inl { font-family:var(--mono); font-size:.82em; background:var(--paper-3); color:var(--ink); padding:1.5px 6px; border-radius:5px; border:1px solid var(--line); }

  /* feature grid */
  .features { display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--line); border:1px solid var(--line); border-radius:5px; overflow:hidden; margin:24px 0; }
  .feature { background:var(--paper); padding:20px 20px 22px; }
  .feature .fi { width:26px; height:26px; color:var(--accent); }
  .feature .fi svg { width:26px; height:26px; display:block; }
  .feature .ft { font-family:var(--display); font-weight:600; font-size:18px; margin:10px 0 5px; }
  .feature .fd { font-size:14.5px; color:var(--ink-soft); line-height:1.55; margin:0; }

  /* code */
  .code { position:relative; margin:22px 0; border-radius:6px; overflow:hidden; box-shadow:var(--shadow); border:1px solid color-mix(in srgb, var(--code-bg) 70%, #000); }
  .code .bar { display:flex; align-items:center; gap:7px; padding:11px 14px; background:color-mix(in srgb, var(--code-bg) 88%, #000); }
  .code .bar .dotc { width:11px; height:11px; border-radius:50%; }
  .code .bar .lang { margin-left:auto; font-family:var(--mono); font-size:10.5px; letter-spacing:.18em; text-transform:uppercase; color:#9c8f7a; }
  .code pre { margin:0; padding:18px 18px; overflow-x:auto; background:var(--code-bg); }
  .code code { font-family:var(--mono); font-size:13.5px; line-height:1.7; color:var(--code-fg); white-space:pre; }
  .copy { margin-left:14px; border:1px solid #443a2d; background:rgba(0,0,0,.25); color:#cdbfa6; font-family:var(--mono); font-size:10.5px; letter-spacing:.08em; padding:5px 10px; border-radius:4px; cursor:pointer; transition:.16s; }
  .copy:hover { color:#fff; border-color:var(--accent); background:var(--accent); }
  .tok-com { color:#8a9a76; font-style:italic; }
  .tok-str { color:#e0a96d; }
  .tok-num { color:#e0a96d; }
  .tok-sym { color:#7bc6d6; }
  .tok-kw  { color:#e2613f; font-weight:500; }
  .tok-const { color:#d7c27a; }

  /* tables */
  .tbl-wrap { margin:22px 0; overflow-x:auto; border:1px solid var(--line); border-radius:5px; }
  table { border-collapse:collapse; width:100%; font-size:14.5px; }
  thead th { font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; color:var(--ink-faint); text-align:left; padding:12px 16px; background:var(--paper-2); border-bottom:1px solid var(--line); white-space:nowrap; }
  tbody td { padding:11px 16px; border-bottom:1px solid var(--line); vertical-align:top; color:var(--ink-soft); }
  tbody tr:last-child td { border-bottom:0; }
  tbody tr:nth-child(even) td { background:color-mix(in srgb, var(--paper-2) 50%, transparent); }
  tbody td:first-child { color:var(--ink); }
  td code, th code { font-family:var(--mono); font-size:12.5px; color:var(--accent); }

  /* notes */
  .note { display:flex; gap:14px; margin:22px 0; padding:16px 18px; border-radius:5px; background:var(--accent-2-weak); border:1px solid color-mix(in srgb, var(--accent-2) 30%, transparent); }
  .note.important { background:var(--accent-weak); border-color:color-mix(in srgb, var(--accent) 30%, transparent); }
  .note .ni { font-family:var(--mono); font-size:10.5px; letter-spacing:.12em; text-transform:uppercase; font-weight:700; color:var(--accent-2); white-space:nowrap; padding-top:2px; }
  .note.important .ni { color:var(--accent); }
  .note p { margin:0; font-size:15px; color:var(--ink); }

  /* lists */
  ul.bul { margin:18px 0; padding-left:0; list-style:none; }
  ul.bul li { position:relative; padding-left:24px; margin-bottom:9px; color:var(--ink-soft); }
  ul.bul li::before { content:"—"; position:absolute; left:0; color:var(--accent); }

  /* diagrams */
  figure.diagram { margin:30px 0; padding:24px 18px 14px; border:1px solid var(--line); border-radius:6px; background:var(--paper-2); }
  figure.diagram svg { display:block; width:100%; height:auto; }
  figure.diagram figcaption { font-size:13px; color:var(--ink-faint); text-align:center; margin-top:12px; font-style:italic; }
  .dg-cell { fill:var(--paper); stroke:var(--line); stroke-width:1.5; }
  .dg-merge { fill:var(--accent-weak); stroke:var(--accent); stroke-width:2; }
  .dg-merge2 { fill:var(--accent-2-weak); stroke:var(--accent-2); stroke-width:2; }
  .dg-t { fill:var(--ink-soft); font-family:var(--mono); font-size:12px; }
  .dg-tc { fill:var(--ink); font-family:var(--body); font-size:13px; font-weight:500; }
  .dg-cap { fill:var(--ink-faint); font-family:var(--mono); font-size:11px; letter-spacing:.1em; text-transform:uppercase; }
  .dg-arrow { stroke:var(--accent); stroke-width:2; fill:none; }
  .dg-node { fill:var(--paper); stroke:var(--accent); stroke-width:1.5; }
  .dg-img { fill:var(--accent-2-weak); stroke:var(--accent-2); stroke-width:1.5; }
  .dg-box { fill:none; stroke:var(--line); stroke-width:1.5; stroke-dasharray:4 4; }

  /* back to top */
  #toTop {
    position:fixed; right:26px; bottom:26px; z-index:50;
    width:48px; height:48px; border-radius:10px; border:1px solid var(--line);
    background:var(--paper); color:var(--accent); cursor:pointer; box-shadow:var(--shadow);
    display:grid; place-items:center; font-size:18px; opacity:0; transform:translateY(12px) scale(.9); pointer-events:none; transition:.28s;
  }
  #toTop.show { opacity:1; transform:translateY(0) scale(1); pointer-events:auto; }
  #toTop:hover { background:var(--accent); color:#fff; border-color:var(--accent); }

  /* footer */
  footer.ft { border-top:1px solid var(--line); margin-top:60px; padding-top:26px; color:var(--ink-faint); font-size:13.5px; }
  footer.ft a { color:var(--accent); text-decoration:none; }

  /* mobile */
  .menu-btn { display:none; }
  .scrim { display:none; }
  @media (max-width:980px) {
    .shell { grid-template-columns:1fr; }
    aside {
      position:fixed; top:0; left:0; height:100vh; width:300px; z-index:80;
      transform:translateX(-100%); transition:transform .3s; background:var(--paper);
    }
    aside.open { transform:translateX(0); }
    .scrim.show { display:block; position:fixed; inset:0; background:rgba(0,0,0,.4); z-index:70; }
    .menu-btn { display:grid; place-items:center; position:fixed; top:16px; left:16px; z-index:65;
      width:46px; height:46px; border-radius:8px; border:1px solid var(--line); background:var(--paper); color:var(--ink); cursor:pointer; box-shadow:var(--shadow); font-size:18px; }
    header.hero { padding-top:84px; }
    .features { grid-template-columns:1fr; }
  }
  @media (max-width:520px){ body{font-size:17px;} .wrap{padding:0 18px;} }
</style>
</head>
<body>
<div id="progress"></div>
<button class="menu-btn" id="menuBtn" aria-label="menu">☰</button>
<div class="scrim" id="scrim"></div>

<div class="shell">
  <aside id="sidebar">
    <div class="brand">
      <span class="logo">docx<span class="dot">.</span></span>
      <span class="ver">v0.11.0</span>
    </div>
    <p class="tagline" data-i18n="tagline"></p>
    <div class="controls">
      <div class="seg" role="group" aria-label="language">
        <button id="lang-zh" class="on">中文</button>
        <button id="lang-en">EN</button>
      </div>
      <button class="icon-btn" id="themeBtn" aria-label="theme">◐</button>
    </div>
    <nav>
      <p class="toc-label" data-i18n="toc"></p>
      <ul id="toc"></ul>
    </nav>
  </aside>

  <main>
    <div class="wrap">
      <header class="hero">
        <p class="kicker">Ruby Gem · .docx</p>
        <h1 class="title">docx<em>.</em></h1>
        <p class="lede" data-i18n="lede"></p>
        <div class="hero-meta">
          <span class="chip"><b>gem</b>&nbsp; install docx</span>
          <span class="chip" data-i18n="chip_ruby"></span>
          <span class="chip" data-i18n="chip_oss"></span>
        </div>
      </header>
      <div id="content"></div>
      <footer class="ft">
        <p data-i18n="footer"></p>
      </footer>
    </div>
  </main>
</div>

<button id="toTop" aria-label="back to top">↑</button>

<script>
/* ============================ i18n strings ============================ */
const UI = {
  zh:{ tagline:"读写 Microsoft Word .docx 的 Ruby 库", toc:"目录",
    lede:"用友好的对象模型操作文档，而不必手改底层 XML。",
    chip_ruby:"Ruby ≥ 2.6", chip_oss:"开源 · MIT 风格",
    footer:"docx · 一个用于 .docx 的 Ruby 库 · 详见 GitHub ruby-docx/docx", copy:"复制", copied:"已复制" },
  en:{ tagline:"A Ruby library for Microsoft Word .docx files", toc:"Contents",
    lede:"Work with documents through a friendly object model — no hand-editing XML.",
    chip_ruby:"Ruby ≥ 2.6", chip_oss:"Open source",
    footer:"docx · a Ruby library for .docx · see GitHub ruby-docx/docx", copy:"copy", copied:"copied" }
};

/* ============================ content model ============================ */
const C = [
{ id:"features", lvl:1, t:{zh:"功能特性",en:"Features"}, blocks:[
  {type:"features", items:[
    {i:"read", zh:["读取内容","遍历段落与书签，并可渲染为 HTML"], en:["Read content","Iterate paragraphs & bookmarks, render to HTML"]},
    {i:"open", zh:["多种打开方式","从文件路径或内存缓冲区 / IO 打开"], en:["Open anywhere","From a file path or an in-memory buffer / IO"]},
    {i:"table", zh:["表格操作","读取行/列/单元格，复制行，替换占位符"], en:["Tables","Read rows/cols/cells, copy rows, substitute text"]},
    {i:"merge", zh:["单元格合并","逻辑网格上合并/拆分，安全处理 gridSpan/vMerge"], en:["Cell merging","Merge/unmerge on a logical grid, safe gridSpan/vMerge"]},
    {i:"image", zh:["图片替换","按 ID、路径或占位符替换，支持表格内批量"], en:["Image replace","By id, path or placeholder; batch in tables"]},
    {i:"text", zh:["文本替换","保留格式替换，并可用正则捕获组"], en:["Text substitution","Preserve formatting, optional regex captures"]},
    {i:"style", zh:["样式管理","新增/修改/删除段落与字符样式"], en:["Styles","Add/modify/remove paragraph & character styles"]},
    {i:"low", zh:["底层访问","需要时直接操作 Nokogiri 节点"], en:["Low-level","Reach the underlying Nokogiri nodes anytime"]}
  ]}
]},

{ id:"install", lvl:1, t:{zh:"安装",en:"Installation"}, blocks:[
  {type:"p", zh:"环境要求：Ruby 2.6 或更高版本。在应用的 Gemfile 中加入：", en:"Requires Ruby 2.6 or later. Add the following to your Gemfile:"},
  {type:"code", code:`gem 'docx'`},
  {type:"p", zh:"然后执行 <code>bundle install</code>。或者直接手动安装：", en:"Then run <code>bundle install</code>. Or install it yourself directly:"},
  {type:"code", code:`gem install docx`, lang:"shell"}
]},

{ id:"quick-start", lvl:1, t:{zh:"快速上手",en:"Quick Start"}, blocks:[
  {type:"p", zh:"最常见的「打开 → 读取 → 编辑 → 保存」完整流程：", en:'The common "open → read → edit → save" round trip:'},
  {type:"diagram", render:"pipeline"},
  {type:"code",
   zh:`require 'docx'

# 打开一个已有文档
doc = Docx::Document.open('example.docx')

# 读取每个段落
doc.paragraphs.each { |p| puts p.to_s }

# 编辑后另存为新文件
doc.paragraphs.each do |p|
  p.each_text_run { |run| run.substitute('{{name}}', 'Alice') }
end
doc.save('example-edited.docx')`,
   en:`require 'docx'

# Open an existing document
doc = Docx::Document.open('example.docx')

# Read every paragraph
doc.paragraphs.each { |p| puts p.to_s }

# Edit and save under a new name
doc.paragraphs.each do |p|
  p.each_text_run { |run| run.substitute('{{name}}', 'Alice') }
end
doc.save('example-edited.docx')`},
  {type:"note", variant:"note", zh:"以下所有示例都假设你已经通过 <code>require 'docx'</code> 引入了该 gem。", en:"Every example below assumes you have already required the gem with <code>require 'docx'</code>."}
]},

{ id:"reading", lvl:1, t:{zh:"读取",en:"Reading"}, blocks:[
  {type:"p", zh:"打开文档后，可以遍历其中的段落、书签，并把内容渲染为 HTML。", en:"Once a document is open, iterate paragraphs and bookmarks, and render content to HTML."}
]},
{ id:"paragraphs", lvl:2, t:{zh:"段落与书签",en:"Paragraphs & bookmarks"}, blocks:[
  {type:"p", zh:"分别遍历段落和书签（书签返回以名称为键的哈希）：", en:"Iterate paragraphs and bookmarks (bookmarks come back as a hash keyed by name):"},
  {type:"code",
   zh:`doc = Docx::Document.open('example.docx')

# 读取并打印段落
doc.paragraphs.each do |p|
  puts p
end

# 读取书签，返回以书签名为键的哈希
doc.bookmarks.each_pair do |name, obj|
  puts name
end`,
   en:`doc = Docx::Document.open('example.docx')

# Retrieve and display paragraphs
doc.paragraphs.each do |p|
  puts p
end

# Bookmarks, returned as a hash keyed by name
doc.bookmarks.each_pair do |name, obj|
  puts name
end`},
  {type:"p", zh:"段落支持 <code>to_s</code>（纯文本）与 <code>to_html</code>，并可通过 <code>each_text_run</code> 访问文本片段。", en:"A paragraph responds to <code>to_s</code> (plain text) and <code>to_html</code>, and exposes runs via <code>each_text_run</code>."}
]},

   zh:`doc = Docx::Document.open('tables.docx')

{ id:"merging", lvl:2, t:{zh:"合并与拆分单元格",en:"Merging & unmerging cells"}, blocks:[
  {type:"p", zh:"合并使用<strong>逻辑网格坐标</strong>（<code>row</code>/<code>col</code> 从 0 开始），内容会保留在左上角的<em class='term'>锚点</em>单元格中。先看如何查看单元格及其合并状态：", en:"Cells merge using <strong>logical grid coordinates</strong> (zero-based). Content is kept in the top-left <em class='term'>anchor</em> cell. First, inspect a cell and its merge state:"},
  {type:"code",
   zh:`doc = Docx::Document.open('tables.docx')
table = doc.tables[0]

cell = table.cell_at(1, 2)        # 按逻辑坐标取单元格
puts cell.text if cell

puts table.merged?(0, 0)          # 该坐标是否属于合并区域

table.each_cell do |cell, row, col|
  puts "#{row},#{col}: #{cell.text} (colspan=#{cell.colspan})"
  puts "  锚点: #{cell.merge_anchor?}, 延续: #{cell.merge_continuation?}"
end`,
   en:`doc = Docx::Document.open('tables.docx')
table = doc.tables[0]

cell = table.cell_at(1, 2)        # by logical coordinate
puts cell.text if cell

puts table.merged?(0, 0)          # part of a merged region?

table.each_cell do |cell, row, col|
  puts "#{row},#{col}: #{cell.text} (colspan=#{cell.colspan})"
  puts "  anchor: #{cell.merge_anchor?}, cont: #{cell.merge_continuation?}"
end`},
  {type:"p", zh:"再看如何合并 / 拆分一个矩形区域（边界为闭区间，含两端）：", en:"Then merge / unmerge a rectangular region (bounds inclusive):"},
  {type:"code",
   zh:`# 合并 (row0,col0) 到 (row1,col1)；内容留在左上角锚点
table.merge_cells(0, 0, 1, 1)

# 从锚点坐标拆分（锚点未合并则为空操作）
table.unmerge_cells(0, 0)

# 也可直接从锚点单元格拆分
anchor = table.cell_at(0, 0)
anchor.unmerge! if anchor&.merge_anchor?

doc.save('merged.docx')`,
   en:`# Merge (row0,col0)..(row1,col1); content stays in the anchor
table.merge_cells(0, 0, 1, 1)

# Unmerge from the anchor (no-op if not merged)
table.unmerge_cells(0, 0)

# Or unmerge directly from the anchor cell
anchor = table.cell_at(0, 0)
anchor.unmerge! if anchor&.merge_anchor?

doc.save('merged.docx')`},
  {type:"note", variant:"important", zh:"合并只是展示层面的操作：它<strong>不会</strong>改变 <code>row_count</code> 或 <code>column_count</code>，因为表格的 <code>tblGrid</code> 保持不变。", en:"Merging is purely presentational: it does <strong>not</strong> change <code>row_count</code> or <code>column_count</code> — the <code>tblGrid</code> is untouched."},
  {type:"table",
   head:{zh:["方法","说明"], en:["Method","Description"]},
   rows:[
    {zh:["<code>cell.colspan</code>","横跨的网格列数"], en:["<code>cell.colspan</code>","Grid columns the cell spans"]},
    {zh:["<code>cell.rowspan</code>","纵跨的网格行数"], en:["<code>cell.rowspan</code>","Grid rows the cell spans"]},
    {zh:["<code>cell.merge_anchor?</code>","是否为合并区域左上角锚点"], en:["<code>cell.merge_anchor?</code>","Is the top-left anchor of a merge"]},
    {zh:["<code>cell.merge_continuation?</code>","是否被其他单元格合并覆盖"], en:["<code>cell.merge_continuation?</code>","Is covered by another cell's merge"]},
    {zh:["<code>cell.unmerge!</code>","拆分以该单元格为锚点的合并"], en:["<code>cell.unmerge!</code>","Unmerge the region anchored here"]}
   ]},
  {type:"table",
   head:{zh:["错误","触发场景"], en:["Error","Raised when"]},
   rows:[
    {zh:["<code>InvalidMergeRange</code>","坐标越界，或 row0&gt;row1 / col0&gt;col1"], en:["<code>InvalidMergeRange</code>","Out of bounds, or row0&gt;row1 / col0&gt;col1"]},
    {zh:["<code>MergeConflict</code>","范围与已有合并重叠"], en:["<code>MergeConflict</code>","Range overlaps an existing merge"]},
    {zh:["<code>InvalidMergeTarget</code>","对非锚点或未合并单元格拆分"], en:["<code>InvalidMergeTarget</code>","Unmerge on a non-anchor / non-merged cell"]}
   ]}
]},

{ id:"writing-text", lvl:1, t:{zh:"写入与替换文本",en:"Writing & substituting text"}, blocks:[
  {type:"p", zh:"集中演示书签插入、段落删除，以及两种文本替换（普通替换、带正则捕获组的替换）：", en:"Bookmark insertion, paragraph removal, and two substitution styles (plain and regex-capture):"},
  {type:"code",
   zh:`doc = Docx::Document.open('example.docx')

# 在书签后插入一行 / 多行
doc.bookmarks['bm'].insert_text_after('Hello world.')
doc.bookmarks['bm2'].insert_multiple_lines_after(['Hello', 'World', 'foo'])

# 删除段落
doc.paragraphs.each do |p|
  p.remove! if p.to_s =~ /TODO/
end

# 替换文本，保留格式
doc.paragraphs.each do |p|
  p.each_text_run { |tr| tr.substitute('_placeholder_', 'value') }
end

# 借助捕获组替换（块参数是 MatchData）
doc.paragraphs.each do |p|
  p.each_text_run do |tr|
    tr.substitute_with_block(/total: (\\d+)/) { |m| "total: #{m[1].to_i * 10}" }
  end
end

doc.save('example-edited.docx')`,
   en:`doc = Docx::Document.open('example.docx')

# Insert one / multiple lines after a bookmark
doc.bookmarks['bm'].insert_text_after('Hello world.')
doc.bookmarks['bm2'].insert_multiple_lines_after(['Hello', 'World', 'foo'])

# Remove paragraphs
doc.paragraphs.each do |p|
  p.remove! if p.to_s =~ /TODO/
end

# Substitute, preserving formatting
doc.paragraphs.each do |p|
  p.each_text_run { |tr| tr.substitute('_placeholder_', 'value') }
end

# Substitute with captures (block arg is a MatchData)
doc.paragraphs.each do |p|
  p.each_text_run do |tr|
    tr.substitute_with_block(/total: (\\d+)/) { |m| "total: #{m[1].to_i * 10}" }
  end
end

doc.save('example-edited.docx')`}
]},

{ id:"styles", lvl:1, t:{zh:"样式",en:"Styles"}, blocks:[

d.styles_configuration.remove_style('Red')`,

  merge:'<path d="M9 7H6a3 3 0 0 0-3 3v4a3 3 0 0 0 3 3h3"/><path d="M15 7h3a3 3 0 0 1 3 3v4a3 3 0 0 1-3 3h-3"/><path d="M8 12h8"/>',

};
function svgIcon(name){ return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">${ICONS[name]||""}</svg>`; }

/* ============================ syntax highlight ============================ */
function esc(s){ return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;"); }
const RUBY_RE = /(?<str>"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*')|(?<com>#[^\n]*)|(?<sym>(?<!:):[a-zA-Z_]\w*)|(?<kw>\b(?:require|def|end|do|module|class|return|if|elsif|else|unless|then|yield|begin|rescue|ensure|true|false|nil|self|each|each_pair|map|puts|pp)\b)|(?<konst>\b[A-Z]\w*\b)|(?<num>\b\d+(?:\.\d+)?\b)/g;
function highlight(code){
  const e = esc(code);
  return e.replace(RUBY_RE, (m, ...args)=>{
    const g = args[args.length-1];
    if(g.str) return '<span class="tok-str">'+g.str+'</span>';
    if(g.com) return '<span class="tok-com">'+g.com+'</span>';
    if(g.sym) return '<span class="tok-sym">'+g.sym+'</span>';
    if(g.kw)  return '<span class="tok-kw">'+g.kw+'</span>';
    if(g.konst) return '<span class="tok-const">'+g.konst+'</span>';
    if(g.num) return '<span class="tok-num">'+g.num+'</span>';
    return m;
  });
}

/* ============================ diagrams (SVG) ============================ */
function diagram(kind, lang){
  const L = (zh,en)=> lang==="zh"?zh:en;
  if(kind==="pipeline"){
    const steps = [ L("打开","Open"), L("读取","Read"), L("编辑","Edit"), L("保存","Save") ];
    const sub = ["Document.open","paragraphs","substitute","save"];
    let x=8, parts="";
    steps.forEach((s,i)=>{
      const cx=x+78;
      parts += `<rect class="dg-node" x="${x}" y="22" rx="4" width="156" height="58"/>`;
      parts += `<text class="dg-tc" x="${cx}" y="46" text-anchor="middle">${s}</text>`;
      parts += `<text class="dg-t" x="${cx}" y="65" text-anchor="middle" font-size="10">${sub[i]}</text>`;
      if(i<3){ const ax=x+156; parts += `<path class="dg-arrow" d="M${ax+4} 51 L${ax+34} 51" marker-end="url(#ah)"/>`; }
      x += 200;
    });
    return `<svg viewBox="0 0 808 104"><defs><marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="4.5" orient="auto"><path d="M0 0 L9 4.5 L0 9 z" fill="var(--accent)"/></marker></defs>${parts}</svg>`;
  }
  if(kind==="grid"){
    // physical vs logical, 3x3 with a 2x2 merge top-left
    const C=46,H=34; const ox1=40, ox2=400, oy=44;
    function label(x,txt){ return `<text class="dg-cap" x="${x}" y="26" text-anchor="middle">${txt}</text>`; }
    let p = label(ox1+C*1.5, L("物理 rows[].cells[]","Physical")) + label(ox2+C*1.5, L("逻辑 cell_at()","Logical"));
    // physical: row0 has 2 cells (merged anchor spanning 2 visually drawn as one wide + 1), row1 same, row2 three cells
    // We'll draw both as 3x3 grids; left marks merged area lightly; right marks anchor spanning.
    for(let r=0;r<3;r++){for(let c=0;c<3;c++){
      const x=ox1+c*C, y=oy+r*H;
      const merged=(r<2&&c<2);
      p+=`<rect class="${merged?'dg-merge':'dg-cell'}" x="${x}" y="${y}" width="${C}" height="${H}"/>`;
    }}
    p+=`<text class="dg-t" x="${ox1+C}" y="${oy+H+ -2+18}" text-anchor="middle" font-size="10" fill="var(--accent)">${L("合并占位","merged")}</text>`;
    // right: draw anchor as one big rect spanning 2x2
    for(let r=0;r<3;r++){for(let c=0;c<3;c++){
      if(r<2&&c<2) continue;
      const x=ox2+c*C, y=oy+r*H;
      p+=`<rect class="dg-cell" x="${x}" y="${y}" width="${C}" height="${H}"/>`;
    }}
    p+=`<rect class="dg-merge" x="${ox2}" y="${oy}" width="${C*2}" height="${H*2}"/>`;
    p+=`<text class="dg-tc" x="${ox2+C}" y="${oy+H}" text-anchor="middle" font-size="12">anchor</text>`;
    return `<svg viewBox="0 0 600 200">${p}</svg>`;
  }
  if(kind==="mergecols"){
    const C=40,H=26, cols=8, rows=4; const ox=40, oy=44, gap=470;
    function grid(ox, mergeRight){
      let s="";
      for(let r=0;r<rows;r++){
        if(mergeRight && r>0){
          for(let c=0;c<5;c++){ s+=`<rect class="dg-cell" x="${ox+c*C}" y="${oy+r*H}" width="${C}" height="${H}"/>`; }
          s+=`<rect class="dg-merge" x="${ox+5*C}" y="${oy+r*H}" width="${C*3}" height="${H}"/>`;
        } else {
          for(let c=0;c<cols;c++){
            const hl=(c>=5);
            s+=`<rect class="${hl?'dg-merge':'dg-cell'}" x="${ox+c*C}" y="${oy+r*H}" width="${C}" height="${H}"/>`;
          }
        }
      }
      return s;
    }
    let p = `<text class="dg-cap" x="${ox+cols*C/2}" y="26" text-anchor="middle">${L("合并前","Before")}</text>`;
    p += grid(ox,false);
    p += `<text class="dg-cap" x="${ox+gap+cols*C/2}" y="26" text-anchor="middle">${L("合并后 cols 5–7","After cols 5–7")}</text>`;
    p += grid(ox+gap,true);
    p += `<path class="dg-arrow" d="M${ox+cols*C+18} ${oy+rows*H/2} L${ox+gap-18} ${oy+rows*H/2}" marker-end="url(#ah2)"/>`;
    return `<svg viewBox="0 0 ${ox+gap+cols*C+30} ${oy+rows*H+20}"><defs><marker id="ah2" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto"><path d="M0 0 L10 5 L0 10 z" fill="var(--accent)"/></marker></defs>${p}</svg>`;
  }
  if(kind==="fit"){
    const modes=[["stretch",L("拉伸填满，可能变形","fill, may distort")],["cover",L("裁剪铺满整框","crop to cover")],["contain",L("完整放入留白","fit inside, letterbox")]];
    let x=10, p="";
    modes.forEach(([m,desc])=>{
      const bx=x+10;
      p+=`<rect class="dg-box" x="${bx}" y="34" width="150" height="96"/>`;
      if(m==="stretch") p+=`<rect class="dg-img" x="${bx}" y="34" width="150" height="96"/>`;
      if(m==="cover") p+=`<rect class="dg-img" x="${bx-14}" y="34" width="178" height="96"/>`;
      if(m==="contain") p+=`<rect class="dg-img" x="${bx+18}" y="52" width="114" height="60"/>`;
      p+=`<text class="dg-tc" x="${bx+75}" y="22" text-anchor="middle" fill="var(--accent-2)">:${m}</text>`;
      p+=`<text class="dg-t" x="${bx+75}" y="148" text-anchor="middle" font-size="10">${desc}</text>`;
      x+=210;
    });
    return `<svg viewBox="0 0 640 160">${p}</svg>`;
  }
  return "";
}

/* ============================ render ============================ */
let lang = localStorage.getItem("docx-lang") || "zh";
const tt = (o)=> o ? (o[lang] ?? o.en ?? o.zh) : "";
const contentEl = document.getElementById("content");
const tocEl = document.getElementById("toc");

function renderBlock(b){
  if(b.type==="p"){ const p=document.createElement("p"); p.innerHTML = tt(b); return p; }
  if(b.type==="note"){
    const d=document.createElement("div"); d.className="note"+(b.variant==="important"?" important":"");
    d.innerHTML = `<span class="ni">${b.variant==="important"?(lang==="zh"?"重要":"IMPORTANT"):(lang==="zh"?"提示":"NOTE")}</span><p>${tt(b)}</p>`;
    return d;
  }
  if(b.type==="code"){
    const code = b.code!==undefined ? b.code : (b[lang] ?? b.en);
    const wrap=document.createElement("div"); wrap.className="code";
    wrap.innerHTML =
      `<div class="bar"><span class="dotc" style="background:#e2613f"></span><span class="dotc" style="background:#e0a96d"></span><span class="dotc" style="background:#8a9a76"></span><span class="lang">${b.lang||"ruby"}</span><button class="copy">${UI[lang].copy}</button></div>`+
      `<pre><code>${highlight(code)}</code></pre>`;
    const btn=wrap.querySelector(".copy");
    btn.addEventListener("click",()=>{ navigator.clipboard.writeText(code).then(()=>{ btn.textContent=UI[lang].copied; setTimeout(()=>btn.textContent=UI[lang].copy,1400); }); });
    return wrap;
  }
  if(b.type==="features"){
    const g=document.createElement("div"); g.className="features";
    b.items.forEach(it=>{
      const x = lang==="zh"?it.zh:it.en;
      const d=document.createElement("div"); d.className="feature";
      d.innerHTML=`<div class="fi">${svgIcon(it.i)}</div><div class="ft">${x[0]}</div><p class="fd">${x[1]}</p>`;
      g.appendChild(d);
    });
    return g;
  }
  if(b.type==="table"){
    const wrap=document.createElement("div"); wrap.className="tbl-wrap";
    const head=(lang==="zh"?b.head.zh:b.head.en).map(h=>`<th>${h}</th>`).join("");
    const rows=b.rows.map(r=>{ const cells=(lang==="zh"?r.zh:r.en).map(c=>`<td>${c}</td>`).join(""); return `<tr>${cells}</tr>`; }).join("");
    wrap.innerHTML=`<table><thead><tr>${head}</tr></thead><tbody>${rows}</tbody></table>`;
    return wrap;
  }
  if(b.type==="diagram"){
    const f=document.createElement("figure"); f.className="diagram";
    f.innerHTML = diagram(b.render, lang);
    return f;
  }
  return document.createElement("span");
}

function render(){
  document.documentElement.lang = lang;
  // UI strings
  document.querySelectorAll("[data-i18n]").forEach(el=>{ el.textContent = UI[lang][el.getAttribute("data-i18n")]; });
  document.getElementById("lang-zh").classList.toggle("on", lang==="zh");
  document.getElementById("lang-en").classList.toggle("on", lang==="en");

  // content
  contentEl.innerHTML=""; tocEl.innerHTML="";
  C.forEach((sec,i)=>{
    const s=document.createElement("section"); s.id=sec.id;
    const num=String(i+1).padStart(2,"0");
    const Htag = sec.lvl===1?"h2":(sec.lvl===2?"h3":"h4");
    const numHtml = sec.lvl===1 ? `<span class="sec-num">§ ${num}</span>` : "";
    s.innerHTML = numHtml + `<${Htag}>${tt(sec.t)}</${Htag}>`;
    sec.blocks.forEach(b=> s.appendChild(renderBlock(b)) );
    contentEl.appendChild(s);

    const a=document.createElement("a"); a.href="#"+sec.id; a.className="lvl"+sec.lvl; a.textContent=tt(sec.t); a.dataset.id=sec.id;
    const li=document.createElement("li"); li.appendChild(a); tocEl.appendChild(li);
  });
  buildSpyTargets();
}

/* ============================ scrollspy + progress + toTop ============================ */
let sections=[], tocLinks={};
function buildSpyTargets(){
  sections = C.map(s=>document.getElementById(s.id)).filter(Boolean);
  tocLinks = {};
  document.querySelectorAll("#toc a").forEach(a=>{ tocLinks[a.dataset.id]=a; });
}
let activeId=null;
function onScroll(){
  const st = window.scrollY || document.documentElement.scrollTop;
  const docH = document.documentElement.scrollHeight - window.innerHeight;
  document.getElementById("progress").style.width = (docH>0? (st/docH*100):0)+"%";
  document.getElementById("toTop").classList.toggle("show", st>700);

  let current=sections.length?sections[0].id:null;
  for(const sec of sections){
    if(sec.getBoundingClientRect().top <= 130) current=sec.id; else break;
  }
  if(current!==activeId){
    activeId=current;
    Object.values(tocLinks).forEach(a=>a.classList.remove("active"));
    document.querySelectorAll("section").forEach(s=>s.classList.remove("reading"));
    const a=tocLinks[current]; const sEl=document.getElementById(current);
    if(a){ a.classList.add("active"); a.scrollIntoView({block:"nearest"}); }
    if(sEl) sEl.classList.add("reading");
  }
}

/* ============================ events ============================ */
function setLang(l){ lang=l; localStorage.setItem("docx-lang",l); const keep=activeId; render(); requestAnimationFrame(()=>{ if(keep){ const e=document.getElementById(keep); if(e) e.scrollIntoView(); } onScroll(); }); }
document.getElementById("lang-zh").addEventListener("click",()=>setLang("zh"));
document.getElementById("lang-en").addEventListener("click",()=>setLang("en"));

const themeBtn=document.getElementById("themeBtn");
function setTheme(t){ document.documentElement.dataset.theme=t; localStorage.setItem("docx-theme",t); }
themeBtn.addEventListener("click",()=> setTheme(document.documentElement.dataset.theme==="dark"?"light":"dark"));
setTheme(localStorage.getItem("docx-theme")|| (matchMedia("(prefers-color-scheme: dark)").matches?"dark":"light"));

document.getElementById("toTop").addEventListener("click",()=> window.scrollTo({top:0,behavior:"smooth"}));

const sidebar=document.getElementById("sidebar"), scrim=document.getElementById("scrim");
function closeMenu(){ sidebar.classList.remove("open"); scrim.classList.remove("show"); }
document.getElementById("menuBtn").addEventListener("click",()=>{ sidebar.classList.add("open"); scrim.classList.add("show"); });
scrim.addEventListener("click",closeMenu);
tocEl.addEventListener("click",e=>{ if(e.target.tagName==="A"){ closeMenu(); } });

window.addEventListener("scroll",()=>requestAnimationFrame(onScroll),{passive:true});
window.addEventListener("resize",onScroll);

render();
onScroll();
</script>
